services:
  # PostgreSQL Database
  - type: pserv
    name: sla-db
    plan: free
    databaseName: sla_monitor
    user: kapil

  # Redis
  - type: redis
    name: sla-redis
    plan: free
    maxmemoryPolicy: noeviction

  # API Service
  - type: web
    name: sla-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-docker.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: POSTGRES_USER
        fromDatabase:
          name: sla-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: sla-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: sla-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: sla-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: sla-db
          property: database
      - key: REDIS_HOST
        fromService:
          name: sla-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: sla-redis
          type: redis
          property: port
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: ENABLE_EMAIL_ALERTS
        value: false

  # Celery Worker
  - type: worker
    name: sla-worker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-docker.txt
    startCommand: celery -A app.celery_app worker --loglevel=info
    envVars:
      - key: POSTGRES_USER
        fromDatabase:
          name: sla-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: sla-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: sla-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: sla-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: sla-db
          property: database
      - key: REDIS_HOST
        fromService:
          name: sla-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: sla-redis
          type: redis
          property: port
      - key: APP_ENV
        value: production

  # Celery Beat
  - type: worker
    name: sla-beat
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-docker.txt
    startCommand: celery -A app.celery_app beat --loglevel=info
    envVars:
      - key: POSTGRES_USER
        fromDatabase:
          name: sla-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: sla-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: sla-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: sla-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: sla-db
          property: database
      - key: REDIS_HOST
        fromService:
          name: sla-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: sla-redis
          type: redis
          property: port
      - key: APP_ENV
        value: production
